version: "3.7"

volumes:
  kong_data: {}

networks:
  kong-net:
    driver: bridge

services:

  #######################################
  # Postgres
  #######################################
  kong-database:
    image: postgres:11
    container_name: kong-postgres
    restart: on-failure
    networks:
      - kong-net
    volumes:
      - kong_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong
      POSTGRES_DB: kong
    ports:
      - "5432:5432"

  #######################################
  # Kong migrations
  #######################################
  kong-migration:
    image: kong:3.6
    command: kong migrations bootstrap
    networks:
      - kong-net
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    depends_on:
      - kong-database

  #######################################
  # Kong Gateway
  #######################################
  kong:
    image: kong:3.6
    container_name: kong
    restart: on-failure
    networks:
      - kong-net
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong

      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001

      # ✅ enable custom plugin
      KONG_PLUGINS: bundled,custom-auth

      # ✅ tell kong where plugin exists
      # KONG_LUA_PACKAGE_PATH: /usr/local/kong/plugins/?.lua;;
      KONG_LUA_PACKAGE_PATH: /usr/local/kong/?.lua;;

    volumes:
      # ✅ mount plugin folder
      - ./plugins:/usr/local/kong

    depends_on:
      - kong-database
      - kong-migration

    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"

  #######################################
  # Konga prepare
  #######################################
  konga-prepare:
    image: pantsel/konga:latest
    command: "-c prepare -a postgres -u postgresql://kong:kong@kong-database:5432/konga"
    networks:
      - kong-net
    restart: on-failure
    depends_on:
      - kong-database

  #######################################
  # Konga UI
  #######################################
  konga:
    image: pantsel/konga:latest
    container_name: konga
    restart: always
    networks:
      - kong-net
    environment:
      DB_ADAPTER: postgres
      DB_URI: postgresql://kong:kong@kong-database:5432/konga
      NODE_ENV: production
    ports:
      - "1337:1337"
    depends_on:
      - kong-database